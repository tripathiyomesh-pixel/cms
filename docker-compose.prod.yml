version: '3.8'

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks: [jcos]

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks: [jcos]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
    env_file: .env
    depends_on: [postgres, redis]
    networks: [jcos]

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile.storefront
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
    networks: [jcos]

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.admin
    restart: always
    networks: [jcos]

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/tejori.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on: [backend, storefront, admin]
    networks: [jcos]

volumes:
  pgdata_prod:

networks:
  jcos:
    driver: bridge