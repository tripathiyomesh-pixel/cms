# ─────────────────────────────────────────────────────────────
#  Jewellery CMS — Docker Compose (Development)
#  Usage: docker compose up -d
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       jewellery_cms
      POSTGRES_USER:     cmsuser
      POSTGRES_PASSWORD: CmsPass@2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmsuser -d jewellery_cms"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (Node.js + Express) ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cms_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:    postgres
      DB_PORT:    5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV:   development
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npx nodemon src/server.js

  # ── Admin Panel (React + Vite) ──────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.admin
    container_name: cms_admin
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ./admin:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # ── pgAdmin (DB GUI in browser) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@cms.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
