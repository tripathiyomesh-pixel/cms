networks:
  cms_network:
    driver: bridge

volumes:
  cms_postgres_data:
  cms_redis_data:
  cms_pgadmin_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: cms_postgres
    environment:
      POSTGRES_DB: jewellery_cms
      POSTGRES_USER: cmsuser
      POSTGRES_PASSWORD: CmsPass@2026
    ports:
      - "5433:5432"
    volumes:
      - cms_postgres_data:/var/lib/postgresql/data
    networks:
      - cms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmsuser -d jewellery_cms"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cms_redis
    ports:
      - "6379:6379"
    volumes:
      - cms_redis_data:/data
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cms_backend
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jewellery_cms
      DB_USER: cmsuser
      DB_PASS: CmsPass@2026
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "4000:4000"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms_network
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.admin
    container_name: admin_app
    ports:
      - "3000:3000"
    volumes:
      - ./admin/src:/app/src
    depends_on:
      - backend
    networks:
      - cms_network
    restart: unless-stopped

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile.storefront
    container_name: storefront_app
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WHATSAPP: "971500000000"
      NEXT_PUBLIC_STORE_NAME: "Luxury Jewellery"
      INTERNAL_API_URL: http://backend:4000/api
    ports:
      - "3001:3001"
    volumes:
      - ./storefront/src:/app/src
    depends_on:
      - backend
    networks:
      - cms_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cms_nginx
    ports:
      - "3010:3010"
      - "3011:3011"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - admin
      - storefront
    networks:
      - cms_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cms_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jewellery.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - cms_pgadmin_data:/var/lib/pgadmin
    networks:
      - cms_network
    restart: unless-stopped
